    <style>
        :root {{
{{theme_vars}}
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 14px;
        }}

        html, body, [data-testid="stAppViewContainer"], [data-testid="stApp"] {{
            background:
                repeating-linear-gradient(0deg, rgba(17, 213, 196, 0.06) 0, rgba(17, 213, 196, 0.06) 1px, transparent 1px, transparent 42px),
                repeating-linear-gradient(90deg, rgba(17, 213, 196, 0.05) 0, rgba(17, 213, 196, 0.05) 1px, transparent 1px, transparent 42px),
                radial-gradient(circle at top center, var(--page-spotlight), transparent 24%),
                linear-gradient(180deg, var(--page-bg) 0%, var(--page-bg-soft) 100%);
            color: var(--text);
        }}

        [data-testid="stHeader"] {{ background: transparent; }}
        #MainMenu, footer {{ visibility: hidden; }}

        .block-container {{
            max-width: 1180px;
            padding-top: 1rem;
            padding-bottom: 3rem;
        }}

        .topbar-shell {{
            background: var(--topbar-bg);
            border: 1px solid var(--topbar-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-soft);
        }}

        .hero-shell,
        .steps-shell {{
            background: var(--hero-bg);
            border: 1px solid var(--hero-line);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-soft);
        }}

        .progress-shell {{
            background: var(--progress-bg);
            border: 1px solid var(--progress-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-soft);
        }}

        .tool-shell {{
            background: var(--tool-bg);
            border: 1px solid var(--tool-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
        }}

        .topbar-shell {{
            padding: 18px 22px;
            margin-bottom: 1rem;
            min-height: 86px;
            display: flex;
            align-items: center;
        }}

        .topbar-shell--theme {{
            display: block;
        }}

        .topbar-row-anchor,
        .theme-topbar-anchor {{
            display: none;
        }}

        .theme-mode-toggle-anchor {{
            display: none;
        }}

        div[data-testid="column"]:has(.theme-topbar-anchor) {{
            margin-bottom: 1rem;
        }}

        div[data-testid="column"]:has(.theme-topbar-anchor) > div,
        div[data-testid="column"]:has(.theme-topbar-anchor) > div > div,
        div[data-testid="column"]:has(.theme-topbar-anchor) > div > div > div {{
            background: var(--topbar-bg);
            border: 1px solid var(--topbar-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-soft);
            padding: 18px 22px;
            min-height: 86px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
        }}

        div[data-testid="column"]:has(.theme-topbar-anchor) [data-testid="stVerticalBlock"] {{
            width: 100%;
        }}

        div[data-testid="column"]:has(.theme-topbar-anchor) div[data-testid="element-container"] {{
            margin-bottom: 0 !important;
        }}

        div[data-testid="column"]:has(.theme-topbar-anchor) [data-testid="stHorizontalBlock"] {{
            align-items: center !important;
            justify-content: flex-start;
            gap: 12px;
            min-height: 50px;
        }}

        div[data-testid="column"]:has(.theme-topbar-anchor) [data-testid="stHorizontalBlock"] > div[data-testid="column"]:first-child {{
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            max-width: 50px;
            min-width: 50px;
            padding-right: 2px;
            box-sizing: border-box;
        }}

        div[data-testid="column"]:has(.theme-topbar-anchor) [data-testid="stHorizontalBlock"] > div[data-testid="column"]:last-child {{
            flex: 1 1 auto;
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }}

        div[data-testid="column"]:has(.theme-topbar-anchor) [data-testid="stHorizontalBlock"] > div[data-testid="column"]:last-child [data-testid="stVerticalBlock"] {{
            display: flex;
            align-items: center;
            min-height: 50px;
        }}

        .theme-toggle-shell {{
            background: var(--theme-card-bg);
            border: 1px solid var(--theme-card-border);
            border-radius: 18px;
            padding: 12px 14px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 0.55rem;
        }}

        .theme-toggle-shell__row {{
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }}

        .theme-toggle-shell [data-testid="stHorizontalBlock"] {{
            align-items: center;
        }}

        .theme-toggle-shell__copy {{
            min-width: 0;
        }}

        .results-shell,
        .download-shell,
        .auth-shell {{
            background: var(--auth-bg);
            border: 1px solid var(--line);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
        }}

        .brand-lockup {{
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--topbar-text);
        }}

        .brand-mark {{
            width: 34px;
            height: 34px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: rgba(17, 213, 196, 0.14);
            border: 1px solid rgba(17, 213, 196, 0.22);
            color: var(--accent);
            font-size: 1rem;
            font-weight: 800;
        }}

        .brand-title {{
            margin: 0;
            color: var(--topbar-text);
            font-size: 0.96rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }}

        .brand-subtitle {{
            margin: 2px 0 0;
            color: var(--topbar-muted);
            font-size: 0.78rem;
            line-height: 1.2;
        }}

        .nav-links {{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            min-height: 34px;
            flex-wrap: nowrap;
            color: var(--topbar-muted);
            font-size: 0.86rem;
            font-weight: 700;
        }}

        .nav-links span,
        .nav-links a {{
            white-space: nowrap;
            color: var(--topbar-muted);
            text-decoration: none;
            position: relative;
        }}

        .nav-links .is-active {{
            color: var(--topbar-active);
            position: relative;
        }}

        .nav-links .is-active::after,
        .nav-links a:hover::after {{
            content: "";
            position: absolute;
            left: 50%;
            bottom: -12px;
            transform: translateX(-50%);
            width: 68px;
            height: 2px;
            border-radius: 999px;
            background: var(--accent);
        }}

        .theme-slot-label {{
            color: var(--topbar-muted);
            font-size: 0.74rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 0 0 8px;
        }}

        .theme-slot-label--topbar {{
            margin-top: 10px;
        }}

        .theme-inline-state {{
            display: flex;
            align-items: center;
            min-height: 44px;
            color: var(--topbar-text);
            font-size: 1rem;
            font-weight: 800;
            line-height: 1.2;
            white-space: nowrap;
            margin-top: 0;
        }}

        .theme-slot-label--compact {{
            margin: 0 0 4px;
            font-size: 0.70rem;
            letter-spacing: 0.10em;
        }}

        .theme-inline-state--compact {{
            min-height: auto;
            font-size: 1.02rem;
        }}

        .theme-state-stack {{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-self: center;
            min-height: 50px;
            width: 100%;
        }}

        .theme-state-stack__hint {{
            color: var(--topbar-muted);
            font-size: 0.74rem;
            line-height: 1.25;
            margin-top: 4px;
            margin-bottom: 0;
        }}

        .appearance-shell {{
            margin-bottom: 1rem;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }}

        .appearance-shell__copy {{
            min-width: 0;
        }}

        .appearance-shell__kicker {{
            color: var(--topbar-muted);
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0 0 4px;
        }}

        .appearance-shell__title {{
            color: var(--topbar-text);
            font-size: 1.02rem;
            font-weight: 800;
            line-height: 1.2;
            margin: 0;
        }}

        .appearance-shell__hint {{
            color: var(--topbar-muted);
            font-size: 0.8rem;
            line-height: 1.25;
            margin: 4px 0 0;
        }}

        .theme-mode-badge {{
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--topbar-text);
            font-size: 1rem;
            font-weight: 800;
            line-height: 1.2;
        }}

        .theme-mode-badge--label-only {{
            gap: 0;
        }}

        .theme-mode-label {{
            color: var(--topbar-text);
            white-space: nowrap;
        }}

        .theme-mode-icon {{
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: var(--theme-icon-bg);
            border: 1px solid var(--theme-icon-border);
            color: var(--theme-icon-text);
            font-size: 1rem;
        }}

        div[data-testid="column"]:has(.theme-topbar-anchor) div.stButton {{
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }}

        div[data-testid="column"]:has(.theme-topbar-anchor) div.stButton > button {{
            min-width: 44px;
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 12px;
            background: var(--theme-icon-bg);
            border: 1px solid var(--theme-icon-border);
            color: var(--theme-icon-text);
            font-size: 1rem;
            font-weight: 800;
        }}

        div[data-testid="column"]:has(.theme-topbar-anchor) div.stButton > button:hover {{
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent-strong);
        }}

        div[data-testid="column"]:has(.theme-topbar-anchor) div.stButton > button p {{
            font-size: 1rem !important;
            line-height: 1 !important;
        }}

        div[data-testid="column"]:has(.theme-mode-toggle-anchor) div.stButton {{
            margin-top: 2px;
        }}

        div[data-testid="column"]:has(.theme-mode-toggle-anchor) div.stButton > button {{
            min-height: 44px;
            padding: 0 14px;
            border-radius: 10px;
            background: var(--mode-toggle-bg);
            border: 1px solid var(--mode-toggle-border);
            color: var(--mode-toggle-text);
            font-weight: 700;
            font-size: 0.95rem;
            line-height: 1.2;
            box-shadow: none;
        }}

        div[data-testid="column"]:has(.theme-mode-toggle-anchor) div.stButton > button:hover {{
            background: var(--mode-toggle-hover-bg);
            border-color: var(--mode-toggle-hover-border);
            color: var(--mode-toggle-hover-text);
        }}

        div[data-testid="column"]:has(.theme-mode-toggle-anchor) div.stButton > button p {{
            color: inherit !important;
            font-weight: inherit !important;
            font-size: inherit !important;
            line-height: inherit !important;
            opacity: 1 !important;
            margin: 0 !important;
        }}

        div[data-testid="column"]:has(.theme-mode-toggle-anchor) div.stButton > button span {{
            color: inherit !important;
            opacity: 1 !important;
        }}

        .hero-shell {{
            padding: 34px 30px;
            margin-bottom: 1rem;
            text-align: center;
        }}

        .hero-badge {{
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(17, 213, 196, 0.08);
            border: 1px solid var(--hero-line);
            color: var(--accent);
            font-size: 0.74rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }}

        .section-badge {{
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-radius: 999px;
            background: var(--badge-bg);
            border: 1px solid var(--badge-border);
            color: var(--badge-text);
            font-size: 0.74rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }}

        .hero-shell h1,
        .steps-shell h1 {{
            margin: 14px 0 0;
            color: var(--hero-text);
            font-size: clamp(2.3rem, 5vw, 4rem);
            line-height: 1.05;
            letter-spacing: -0.04em;
            font-weight: 800;
        }}

        .hero-shell h1 .accent {{
            color: var(--accent);
        }}

        .hero-copy {{
            margin: 18px auto 0;
            max-width: 760px;
            color: var(--hero-muted);
            line-height: 1.7;
            font-size: 1.02rem;
        }}

        .hero-actions {{
            margin-top: 22px;
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }}

        .hero-btn {{
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0 24px;
            border-radius: 12px;
            border: 1px solid var(--tool-border);
            font-weight: 800;
            font-size: 0.95rem;
            text-decoration: none;
        }}

        .hero-btn.primary {{
            background: var(--accent);
            border-color: transparent;
            color: #062027;
        }}

        .hero-btn.ghost {{
            background: var(--hero-ghost-btn-bg);
            color: var(--hero-ghost-btn-text);
            border-color: var(--hero-ghost-btn-border);
        }}

        .hero-benefits {{
            margin: 24px auto 2px;
            max-width: 860px;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }}

        .hero-benefit {{
            border: 1px solid var(--hero-line);
            border-radius: 14px;
            padding: 14px 15px;
            text-align: left;
            background: rgba(255, 255, 255, 0.02);
            color: var(--hero-muted);
            font-size: 0.82rem;
            line-height: 1.45;
        }}

        .hero-benefit strong {{
            display: block;
            color: var(--hero-text);
            margin-bottom: 3px;
            font-size: 0.95rem;
        }}

        .steps-shell {{
            padding: 28px;
            margin-bottom: 1.2rem;
        }}

        .steps-head {{
            text-align: center;
            margin-bottom: 20px;
        }}

        .steps-head h2 {{
            margin: 14px 0 0;
            color: var(--hero-text);
            font-size: clamp(2rem, 4vw, 3.2rem);
            letter-spacing: -0.03em;
            line-height: 1.06;
        }}

        .steps-grid {{
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            margin-top: 4px;
        }}

        .step-card {{
            position: relative;
            min-height: 152px;
            border-radius: 16px;
            border: 1px solid var(--hero-line);
            background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.01));
            padding: 18px 16px 16px;
        }}

        .step-card::after {{
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: 46px;
            height: 30px;
            border-radius: 0 16px 0 16px;
            background: rgba(255,255,255,0.04);
        }}

        .step-icon {{
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            background: rgba(17, 213, 196, 0.10);
            border: 1px solid rgba(17, 213, 196, 0.16);
            color: var(--accent);
            font-size: 0.88rem;
            margin-bottom: 14px;
        }}

        .step-kicker {{
            color: var(--accent);
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }}

        .step-title {{
            color: var(--hero-text);
            font-size: 0.98rem;
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1.3;
        }}

        .step-copy {{
            color: var(--hero-muted);
            font-size: 0.82rem;
            line-height: 1.6;
        }}

        .parser-intro {{
            text-align: center;
            padding: 1rem 0 1.2rem;
        }}

        .parser-heading {{
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }}

        .parser-heading h2 {{
            margin: 14px 0 0;
            color: var(--display-heading);
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.06;
            letter-spacing: -0.04em;
            font-weight: 800;
        }}

        .parser-copy {{
            margin: 12px 0 0;
            max-width: 760px;
            color: var(--display-copy);
            line-height: 1.75;
            font-size: 0.97rem;
        }}

        .workspace-grid {{
            display: grid;
            grid-template-columns: minmax(260px, 0.9fr) minmax(0, 1.4fr);
            gap: 16px;
            align-items: start;
            margin-bottom: 1.2rem;
        }}

        .progress-shell {{
            padding: 18px;
            min-height: 350px;
        }}

        .progress-title {{
            color: var(--progress-title);
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 16px;
        }}

        .progress-steps {{
            display: flex;
            flex-direction: column;
            gap: 14px;
        }}

        .progress-step {{
            display: grid;
            grid-template-columns: 30px 1fr;
            gap: 12px;
            align-items: start;
        }}

        .progress-index {{
            width: 30px;
            height: 30px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            font-size: 0.82rem;
            font-weight: 800;
            border: 1px solid var(--progress-border);
            color: var(--progress-copy);
            background: var(--hero-ghost);
        }}

        .progress-step.is-active .progress-index {{
            background: var(--accent);
            color: #082126;
            border-color: transparent;
            box-shadow: 0 0 0 6px rgba(17, 213, 196, 0.10);
        }}

        .progress-step-title {{
            color: var(--progress-subtle);
            font-size: 0.93rem;
            font-weight: 700;
            line-height: 1.2;
            margin-top: 4px;
        }}

        .progress-step-copy {{
            color: var(--progress-copy);
            font-size: 0.78rem;
            line-height: 1.5;
            margin-top: 4px;
        }}

        .progress-divider {{
            height: 1px;
            background: var(--progress-border);
            margin: 18px 0 14px;
        }}

        .progress-footer {{
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            color: var(--progress-copy);
            font-size: 0.82rem;
            font-weight: 700;
        }}

        .mini-pill {{
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--progress-pill-bg);
            color: var(--progress-pill-text);
            font-size: 0.76rem;
            font-weight: 800;
            min-width: 72px;
        }}

        .tool-shell {{
            padding: 18px;
        }}

        .tool-card {{
            border: 1px solid var(--line);
            background: var(--surface);
            border-radius: 18px;
            padding: 14px 16px;
            margin: 0 0 0.55rem;
            box-shadow: var(--shadow-soft);
        }}

        .tool-card__head {{
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 0;
        }}

        .tool-card__icon {{
            width: 28px;
            height: 28px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            background: var(--tool-icon-bg);
            border: 1px solid var(--tool-icon-border);
            color: var(--tool-icon-text);
            font-size: 0.9rem;
            flex: none;
        }}

        .tool-card__title {{
            color: var(--tool-title);
            font-size: 0.94rem;
            font-weight: 800;
            line-height: 1.2;
        }}

        .tool-card__copy {{
            color: var(--tool-copy);
            font-size: 0.78rem;
            line-height: 1.45;
            margin-top: 2px;
        }}

        .file-chip-row {{
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 0.5rem 0 0.85rem;
        }}

        .file-chip {{
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.94);
            color: #1d323d;
            border: 1px solid rgba(17,39,51,0.10);
            font-size: 0.8rem;
            font-weight: 700;
        }}

        .file-chip.is-encrypted {{
            background: #fff4ea;
            color: #9a4e08;
            border-color: #f2c7a0;
        }}

        .metric-grid {{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 1rem;
        }}

        .metric-card {{
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px 15px;
            box-shadow: var(--shadow-soft);
        }}

        .metric-card__label {{
            color: var(--muted);
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }}

        .metric-card__value {{
            color: var(--text-strong);
            font-size: 1.02rem;
            font-weight: 800;
            line-height: 1.35;
        }}

        .status-card {{
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 18px;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: var(--surface);
            margin-bottom: 1rem;
        }}

        .status-card__group {{
            display: flex;
            align-items: center;
            gap: 12px;
        }}

        .status-card__dot {{
            width: 12px;
            height: 12px;
            border-radius: 999px;
            background: var(--muted);
            box-shadow: 0 0 0 7px rgba(82,102,116,0.10);
            flex: none;
        }}

        .status-card.is-running .status-card__dot {{
            background: var(--accent);
            box-shadow: 0 0 0 7px rgba(17,213,196,0.12);
        }}

        .status-card.is-stopped .status-card__dot {{
            background: #f0a24b;
            box-shadow: 0 0 0 7px rgba(240,162,75,0.12);
        }}

        .status-card__title {{
            color: var(--text-strong);
            font-size: 0.95rem;
            font-weight: 800;
        }}
